<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2 BANGLALI - Real Runner AD System</title>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; }
        
        #game-box { 
            position: relative; width: 360px; height: 620px; 
            border: 6px solid #ffcc00; border-radius: 20px; 
            background: #111; overflow: hidden; box-shadow: 0 0 50px #ffcc00;
        }
        
        canvas { display: block; }

        #hud { 
            position: absolute; top: 15px; left: 0; width: 100%;
            color: #ffcc00; font-size: 20px; font-weight: bold; 
            z-index: 50; text-shadow: 2px 2px #000; text-align: center;
        }

        .pop-up {
            position: absolute; font-weight: bold; text-shadow: 2px 2px #000;
            z-index: 100; pointer-events: none; animation: popUpAnim 1.5s ease-out forwards;
        }

        @keyframes popUpAnim {
            0% { transform: scale(0.5) translateY(0); opacity: 0; }
            30% { transform: scale(1.3) translateY(-30px); opacity: 1; }
            100% { transform: scale(1) translateY(-120px); opacity: 0; }
        }

        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 200; color: #ffcc00; text-align: center;
        }

        .btn { 
            padding: 18px 60px; font-size: 26px; background: #ffcc00; 
            color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; 
            margin-top: 20px; box-shadow: 0 5px 25px rgba(255, 204, 0, 0.6);
        }

        #ad-status { color: #fff; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="hud">টোটাল চাঁদা কালেক্ট: <span id="balance">0</span> TK</div>
    
    <div id="overlay">
        <h1 style="font-size: 40px; margin: 0;">P2 BANGLALI</h1>
        <p id="ad-info" style="color: #fff; font-size: 16px; padding: 0 20px; margin-top: 15px;">গেমটি ২৪ ঘণ্টা ফ্রি খেলতে একটি অ্যাড দেখুন</p>
        <button id="start-btn" class="btn" onclick="handleAdAndStart()">START GAME</button>
        <p id="ad-status">অ্যাড দেখলে ২৪ ঘণ্টা আনলক থাকবে</p>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<audio id="gameMusic" loop>
    <source src="main_music.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const gameBox = document.getElementById("game-box");
    const balanceEl = document.getElementById("balance");
    const music = document.getElementById("gameMusic");
    const adInfo = document.getElementById("ad-info");
    
    canvas.width = 360; canvas.height = 620;

    // আপনার দেওয়া অ্যাড লিংক দুটি
    const adLink1 = "https://www.effectivegatecpm.com/v92e45iz?key=cf79e197f948f769345212d475b5ef6c";
    const adLink2 = "https://www.effectivegatecpm.com/r34saeu51i?key=ddb7d0bcf24bf44578801697b9b02f74";

    let balance = 0, isRunning = false, objects = [], roadOffset = 0;
    let currentSpeed = 3.5; 
    let animFrame = 0;
    let player = { x: 160, y: 500, w: 45, h: 50 };

    // অ্যাড লজিক ফাংশন
    function handleAdAndStart() {
        const lastAdTime = localStorage.getItem('lastAdSeenTime');
        const currentTime = new Date().getTime();
        const twentyFourHours = 24 * 60 * 60 * 1000; // ২৪ ঘণ্টা মিলি সেকেন্ডে

        if (!lastAdTime || (currentTime - lastAdTime > twentyFourHours)) {
            // যদি ২৪ ঘণ্টা পার হয়ে যায়, অ্যাড দেখাবে
            let adToOpen = (localStorage.getItem('adTurn') === '2') ? adLink2 : adLink1;
            
            // নতুন ট্যাবে অ্যাড ওপেন করা
            window.open(adToOpen, '_blank');
            
            // তথ্য আপডেট করা
            localStorage.setItem('lastAdSeenTime', currentTime);
            localStorage.setItem('adTurn', (adToOpen === adLink1) ? '2' : '1');
            
            adInfo.innerText = "অ্যাড দেখার জন্য ধন্যবাদ! এখন গেমটি শুরু হচ্ছে...";
            setTimeout(startGame, 2000); // ২ সেকেন্ড পর গেম শুরু হবে
        } else {
            // ২৪ ঘণ্টার ভেতর থাকলে সরাসরি গেম শুরু
            startGame();
        }
    }

    function startGame() {
        document.getElementById("overlay").style.display = "none";
        isRunning = true;
        music.currentTime = 0;
        music.play().catch(e => console.log("Music blocked."));
        gameLoop();
    }

    // ড্র্যাগ কন্ট্রোল
    let isDragging = false;
    canvas.addEventListener('mousedown', () => isDragging = true);
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mousemove', (e) => movePlayer(e.clientX));
    canvas.addEventListener('touchstart', (e) => { isDragging = true; e.preventDefault(); });
    canvas.addEventListener('touchend', () => isDragging = false);
    canvas.addEventListener('touchmove', (e) => { movePlayer(e.touches[0].clientX); e.preventDefault(); });

    function movePlayer(clientX) {
        if (!isDragging || !isRunning) return;
        let rect = canvas.getBoundingClientRect();
        let targetX = clientX - rect.left - player.w / 2;
        if (targetX > 20 && targetX < canvas.width - player.w - 20) player.x = targetX;
    }

    function createPop(text, color, x, y, size = "20px") {
        const msg = document.createElement("div");
        msg.className = "pop-up";
        msg.style.left = (x > 180 ? x - 120 : x) + "px";
        msg.style.top = y + "px";
        msg.style.color = color;
        msg.style.fontSize = size;
        msg.innerText = text;
        gameBox.appendChild(msg);
        setTimeout(() => msg.remove(), 1500);
    }

    function spawnObject() {
        if (objects.length === 0 || objects[objects.length - 1].y > 220) {
            const types = [
                { type: 'shop', emoji: '🏬' }, 
                { type: 'rickshaw', emoji: '🛺' },
                { type: 'paddy', emoji: '🌾' },
                { type: 'scale', emoji: '⚖️' }
            ];
            let choice = types[Math.floor(Math.random() * types.length)];
            objects.push({
                x: Math.random() * (canvas.width - 100) + 50,
                y: -100,
                type: choice.type,
                emoji: choice.emoji,
                w: 45, h: 45
            });
        }
    }

    function update() {
        if (!isRunning) return;
        currentSpeed += 0.003; 
        roadOffset += currentSpeed;
        if (roadOffset >= 100) roadOffset = 0;
        animFrame += 0.15;
        spawnObject();

        objects.forEach((obj, i) => {
            obj.y += currentSpeed;
            if (player.x < obj.x + 35 && player.x + player.w > obj.x + 5 && 
                player.y < obj.y + 35 && player.y + player.h > obj.y + 5) {
                
                if (obj.type === 'shop' || obj.type === 'rickshaw') {
                    balance += 50;
                    createPop("৫০ টাকা চাঁদা কালেক্ট! 💰", "#00ff00", player.x, player.y);
                } else if (obj.type === 'paddy') {
                    balance = Math.floor(balance / 2);
                    createPop("ধানের শীষে অর্ধেক চাঁদা শেষ! 🌾", "#ff4444", 40, 300);
                } else if (obj.type === 'scale') {
                    isRunning = false;
                    music.pause();
                    createPop("সোজা জেল! ⛓️🚓", "#ff0000", 80, 250, "40px");
                    setTimeout(gameOver, 1500);
                }
                objects.splice(i, 1);
            }
            if (obj.y > canvas.height) objects.splice(i, 1);
        });
        balanceEl.innerText = balance;
    }

    function draw() {
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#ffcc00";
        ctx.lineWidth = 6;
        ctx.setLineDash([50, 50]);
        [0.25, 0.5, 0.75].forEach(lane => {
            ctx.beginPath();
            ctx.moveTo(canvas.width * lane, roadOffset - 100);
            ctx.lineTo(canvas.width * lane, canvas.height + 100);
            ctx.stroke();
        });
        ctx.setLineDash([]);
        ctx.textAlign = "center";
        objects.forEach(obj => {
            ctx.font = "45px Arial";
            ctx.fillText(obj.emoji, obj.x + obj.w/2, obj.y + obj.h/2);
        });
        
        ctx.save();
        let bounce = Math.abs(Math.sin(animFrame)) * 8; 
        ctx.translate(player.x + player.w/2, player.y + player.h/2 - bounce);
        ctx.font = "55px Arial";
        ctx.fillText("🏃", 0, 20); 
        ctx.restore();
    }

    function gameOver() {
        const overlay = document.getElementById("overlay");
        overlay.innerHTML = `
            <h1 style="color:red; font-size:35px; margin:0;">ধরা খেয়েছেন! ⛓️</h1>
            <h2 style="color:gold; font-size:24px; margin:15px 0;">টোটাল চাঁদা: ${balance} TK</h2>
            <button class="btn" onclick="location.reload()">আবার খেলুন</button>`;
        overlay.style.display = "flex";
    }

    function gameLoop() {
        update(); draw();
        if (isRunning) requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
